<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%" style="cursor: pointer;">
  <defs>
    <linearGradient id="greenPrimary" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34D399" /><stop offset="100%" stop-color="#059669" /></linearGradient>
    <linearGradient id="greyCeramicFront" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#F1F5F9" /></linearGradient>
    <linearGradient id="greyCeramicDepth" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#E2E8F0" /><stop offset="100%" stop-color="#94A3B8" /></linearGradient>
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#64748B" flood-opacity="0.25" /></filter>
  </defs>
  <style>
    .bg { transition: transform 0.3s ease; transform-origin: center; }
    .bg-green { opacity: 0; transition: opacity 0.3s ease; }
    .plus { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .plus-fill { transition: fill 0.3s ease; }
    
    svg:hover .bg, svg.selected .bg { transform: scale(1.05); }
    svg:hover .bg-green, svg.selected .bg-green { opacity: 1; }
    svg:hover .plus, svg.selected .plus { transform: rotate(180deg); }
    svg:hover .plus-fill, svg.selected .plus-fill { fill: #FFFFFF; }
  </style>
  <g transform="translate(40, 40)">
    <!-- Base Ceramic Circle -->
    <g class="bg">
      <circle cx="0" cy="4" r="24" fill="url(#greyCeramicDepth)" filter="url(#iconShadow)" />
      <circle cx="0" cy="0" r="24" fill="url(#greyCeramicFront)" />
      <circle cx="0" cy="0" r="24" class="bg-green" fill="url(#greenPrimary)" />
      <circle cx="0" cy="-1" r="23" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" />
    </g>
    <!-- Plus Icon -->
    <g class="plus">
      <!-- Shadow depth of plus -->
      <path d="M -4,-12 L 4,-12 L 4,-4 L 12,-4 L 12,4 L 4,4 L 4,12 L -4,12 L -4,4 L -12,4 L -12,-4 L -4,-4 Z" fill="#047857" transform="translate(0,2)" opacity="0.4" />
      <!-- Plus body -->
      <path class="plus-fill" d="M -4,-12 L 4,-12 L 4,-4 L 12,-4 L 12,4 L 4,4 L 4,12 L -4,12 L -4,4 L -12,4 L -12,-4 L -4,-4 Z" fill="url(#greenPrimary)" />
      <path d="M -4,-12 L 4,-12 L 4,-4 L 12,-4 L 12,4 L 4,4 L 4,12 L -4,12 L -4,4 L -12,4 L -12,-4 L -4,-4 Z" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5" />
    </g>
  </g>
</svg>