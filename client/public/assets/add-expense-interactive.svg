<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%" style="cursor: pointer;">
  <defs>
    <!-- Vibrant "Action" Gradient -->
    <linearGradient id="greenPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="paperSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadowBase" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#64748B" flood-opacity="0.15" />
    </filter>
    <filter id="shadowHover" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#64748B" flood-opacity="0.25" />
    </filter>
  </defs>

  <style>
    /* 1. Receipt Animation */
    .receipt {
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      transform-origin: center;
    }

    /* 2. Badge Animation (Scaling & lifting) */
    .badge-animator {
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-box: fill-box;   /* CRITICAL: Locks logic to the element's box */
      transform-origin: center;  /* CRITICAL: Rotates/Scales from its own center */
    }

    /* 3. Color & Internal Elements */
    .badge-green {
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    .plus-icon {
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  fill 0.3s ease;
      transform-box: fill-box;
      transform-origin: center;
    }
    .amount-line {
      transition: fill 0.4s ease;
    }

    /* Staggered Delays */
    .badge-animator { transition-delay: 0.05s; }
    
    /* Fast reset */
    svg:not(:hover) * { transition-delay: 0s; }


    /* --- Interaction States --- */
    
    /* Receipt lifts */
    svg:hover .receipt, svg.selected .receipt {
      transform: translateY(-4px) scale(0.98);
    }

    /* Receipt Data lights up */
    svg:hover .amount-line, svg.selected .amount-line {
      fill: #10B981;
    }

    /* Badge Scales Up & Lifts */
    svg:hover .badge-animator, svg.selected .badge-animator {
      transform: scale(1.2) translateY(-4px);
    }
    
    /* Green Background Fades In */
    svg:hover .badge-green, svg.selected .badge-green {
      opacity: 1;
    }

    /* Plus Icon Spins & Turns White */
    svg:hover .plus-icon, svg.selected .plus-icon {
      fill: #FFFFFF;
      transform: rotate(180deg);
    }
  </style>

  <g transform="translate(40, 40)">
    
    <!-- THE RECEIPT (Background Layer) -->
    <g class="receipt" filter="url(#shadowBase)">
      <rect x="-24" y="-24" width="34" height="42" rx="4" fill="url(#paperSurface)" />
      
      <!-- Receipt Lines -->
      <rect x="-16" y="-16" width="18" height="4" rx="2" fill="#94A3B8" />
      
      <!-- List Items -->
      <g transform="translate(0, 2)">
        <rect x="-16" y="-8" width="10" height="3" rx="1.5" fill="#E2E8F0" />
        <rect x="-4" y="-8" width="6" height="3" rx="1.5" fill="#CBD5E1" class="amount-line" />
        
        <rect x="-16" y="0" width="12" height="3" rx="1.5" fill="#E2E8F0" />
        <rect x="-2" y="0" width="4" height="3" rx="1.5" fill="#CBD5E1" class="amount-line" />

        <rect x="-16" y="8" width="8" height="3" rx="1.5" fill="#E2E8F0" />
        <rect x="-6" y="8" width="8" height="3" rx="1.5" fill="#CBD5E1" class="amount-line" />
      </g>
    </g>

    <!-- THE ACTION BADGE (Floating Layer) -->
    <!-- 1. Positioning Group (Static, moves badge to bottom right) -->
    <g transform="translate(14, 14)">
      
      <!-- 2. Animator Group (Handles the scaling/hover effects) -->
      <g class="badge-animator" filter="url(#shadowBase)">
        
        <!-- White Base (Inactive) -->
        <circle cx="0" cy="0" r="13" fill="#FFFFFF" />
        <circle cx="0" cy="0" r="13" fill="none" stroke="#E2E8F0" stroke-width="1" />
        
        <!-- Green Base (Active/Hover) -->
        <circle cx="0" cy="0" r="13" fill="url(#greenPrimary)" class="badge-green" />
        
        <!-- Plus Icon -->
        <path class="plus-icon" d="M -2,-7 L 2,-7 L 2,-2 L 7,-2 L 7,2 L 2,2 L 2,7 L -2,7 L -2,2 L -7,2 L -7,-2 L -2,-2 Z" fill="#94A3B8" />
      
      </g>
    </g>

  </g>
</svg>