<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" style="cursor: pointer;">
  <defs>
    <!-- Changed to userSpaceOnUse to ensure the gradient flows seamlessly across both shapes -->
    <linearGradient id="greenPrimary" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="navShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#10B981" flood-opacity="0.4" />
    </filter>
  </defs>
  <style>
    /* Shared styles for smooth color transition */
    .house-part { 
      fill: #94A3B8; 
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
    }
    
    /* Roof-specific animation logic */
    .roof {
      transform-origin: center bottom;
    }

    /* Hover/Active State */
    svg:hover .house-part, svg.selected .house-part {
      fill: url(#greenPrimary);
      filter: url(#navShadow);
    }

    /* Animate only the roof upwards */
    svg:hover .roof, svg.selected .roof {
      transform: translateY(-3px);
    }
  </style>

  <!-- Part 1: The Roof (The Lid) -->
  <path class="house-part roof" d="M 12,3 L 2,11 L 4,11 L 12,6 L 20,11 L 22,11 Z" />
  
  <!-- Part 2: The Body (Walls + Door merged into one solid base) -->
  <path class="house-part body" d="M 4,11 L 4,21 L 10,21 L 10,14 L 14,14 L 14,21 L 20,21 L 20,11 L 18,11 L 18,19 L 6,19 L 6,11 Z" />
</svg>