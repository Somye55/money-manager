<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" style="cursor: pointer; overflow: visible;">
  <defs>
    <!-- userSpaceOnUse ensures the gradient flows seamlessly across both slices as if they were one shape -->
    <linearGradient id="greenPrimary" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="navShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#10B981" flood-opacity="0.4" />
    </filter>
  </defs>
  <style>
    .chart-part { 
      fill: #94A3B8; 
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 12px 12px;
    }
    
    /* Hover/Active State */
    svg:hover .chart-part, svg.selected .chart-part {
      fill: url(#greenPrimary);
      filter: url(#navShadow);
    }
    
    /* 
       Animation:
       - Distance reduced from 3px to 1.5px so it stays inside the 24x24 bounds
    */
    svg:hover .small-slice, svg.selected .small-slice {
      transform: translate(1.5px, -1.5px);
    }
  </style>
  
  <!-- Small Slice (Top-Right 1/4th Wedge) -->
  <path class="chart-part small-slice" d="M 12,12 L 12,2 A 10,10 0 0,1 22,12 L 12,12 Z" />

  <!-- Main Body (The rest of the pie - 3/4) -->
  <path class="chart-part main-body" d="M 12,12 L 22,12 A 10,10 0 1,1 12,2 L 12,12 Z" />
  
</svg>